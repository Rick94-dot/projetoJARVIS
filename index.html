<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS — Odonto Empresas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #cfd0eb;
      --text: #12192e;
      --muted: #5a6380;
      --light: #e8e9f5;
      --neu-shadow-dark: #b0b1cc;
      --neu-shadow-light: #eeeffe;
      --white: rgba(255,255,255,0.85);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      color: var(--text);
      overflow: hidden;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ═══════════════════════════════════
       LOGIN
    ═══════════════════════════════════ */
    #loginScreen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    #loginScreen.hidden { display: none; }

    /* Decorative circles */
    #loginScreen::before {
      content: '';
      position: fixed; top: -120px; right: -80px;
      width: 420px; height: 420px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
      pointer-events: none;
    }

    #loginScreen::after {
      content: '';
      position: fixed; bottom: -100px; left: -60px;
      width: 360px; height: 360px; border-radius: 50%;
      background: radial-gradient(circle, rgba(18,25,46,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; align-items: center;
      gap: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .logo-container {
      margin-bottom: 36px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-neu {
      width: 156px; height: 156px; border-radius: 50%;
      background: var(--bg);
      box-shadow:
        16px 16px 32px var(--neu-shadow-dark),
        -16px -16px 32px var(--neu-shadow-light);
      display: flex; align-items: center; justify-content: center;
    }

    .logo-neu img {
      width: 108px; height: 108px; object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(18,25,46,0.15));
    }

    .login-heading {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-heading h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem; font-weight: 600;
      color: var(--text); letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .login-heading p {
      font-size: 0.88rem; color: var(--muted);
      margin-top: 10px; line-height: 1.65;
      font-weight: 300;
    }

    .login-form {
      width: 100%;
      display: flex; flex-direction: column; gap: 14px;
    }

    .field-label {
      font-size: 0.68rem; font-weight: 500;
      color: var(--muted); letter-spacing: 0.18em;
      text-transform: uppercase; display: block;
      margin-bottom: 8px;
    }

    .neu-field {
      position: relative;
    }

    .neu-field svg {
      position: absolute; left: 20px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: var(--muted); pointer-events: none;
      opacity: 0.6;
    }

    .neu-input {
      width: 100%;
      background: var(--bg);
      border: none; border-radius: 16px;
      padding: 18px 20px 18px 48px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem; font-weight: 400;
      outline: none;
      box-shadow:
        inset 5px 5px 10px var(--neu-shadow-dark),
        inset -5px -5px 10px var(--neu-shadow-light);
      transition: box-shadow 0.25s;
    }

    .neu-input:focus {
      box-shadow:
        inset 6px 6px 14px var(--neu-shadow-dark),
        inset -6px -6px 14px var(--neu-shadow-light),
        0 0 0 1.5px rgba(18,25,46,0.2);
    }

    .neu-input::placeholder { color: rgba(90,99,128,0.4); }
    .neu-input.shake { animation: shake 0.4s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .login-btn {
      width: 100%; padding: 18px;
      border-radius: 16px;
      background: var(--text);
      border: none; color: var(--bg);
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      box-shadow: 8px 8px 20px rgba(18,25,46,0.25), -2px -2px 8px rgba(255,255,255,0.1);
      margin-top: 8px;
    }

    .login-btn:hover {
      background: #1e2d52;
      box-shadow: 10px 10px 24px rgba(18,25,46,0.3), -2px -2px 8px rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    .login-btn:active { transform: translateY(1px); }

    .login-btn svg { width: 16px; height: 16px; transition: transform 0.2s; }
    .login-btn:hover svg { transform: translateX(4px); }

    /* ═══════════════════════════════════
       CHAT
    ═══════════════════════════════════ */
    #chatScreen {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      background: var(--bg);
    }

    #chatScreen.hidden { display: none; }

    /* Subtle dot grid */
    #chatScreen::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(18,25,46,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* ── Header ── */
    .chat-header {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 14px;
      padding: 16px 28px;
      background: rgba(207,208,235,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 1px 0 rgba(18,25,46,0.06), 0 4px 20px rgba(18,25,46,0.04);
    }

    .header-logo-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--bg);
      box-shadow: 4px 4px 10px var(--neu-shadow-dark), -4px -4px 10px var(--neu-shadow-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }

    .header-logo-btn img { width: 30px; height: 30px; object-fit: contain; }

    .header-title { flex: 1; }

    .header-title h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; font-weight: 600;
      color: var(--text); letter-spacing: 0.01em;
    }

    .header-title p {
      font-size: 0.68rem; color: var(--muted);
      font-weight: 400; letter-spacing: 0.06em;
      text-transform: uppercase; margin-top: 1px;
    }

    .header-actions {
      display: flex; align-items: center; gap: 12px;
    }

    .status-pill {
      display: flex; align-items: center; gap: 7px;
      background: var(--bg);
      box-shadow: 3px 3px 8px var(--neu-shadow-dark), -3px -3px 8px var(--neu-shadow-light);
      border-radius: 20px; padding: 8px 14px;
      font-size: 0.72rem; color: var(--muted);
      font-weight: 400; letter-spacing: 0.04em;
    }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,0.6);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .user-orb {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--text); color: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 600;
      box-shadow: 4px 4px 10px rgba(18,25,46,0.25), -2px -2px 6px rgba(255,255,255,0.1);
      flex-shrink: 0; cursor: default;
      position: relative;
    }

    .user-orb-name {
      position: absolute; bottom: -18px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem; font-weight: 400;
      color: var(--muted); white-space: nowrap;
      letter-spacing: 0.04em;
    }

    /* ── Messages ── */
    .messages {
      position: relative; z-index: 1;
      flex: 1; overflow-y: auto;
      padding: 36px 32px 24px;
      display: flex; flex-direction: column; gap: 28px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(18,25,46,0.12); border-radius: 3px; }

    .msg {
      display: flex; gap: 12px;
      max-width: 75%;
      animation: fadeUp 0.3s ease;
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .msg-orb {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
      overflow: hidden;
    }

    .msg.bot .msg-orb {
      background: var(--bg);
      box-shadow: 3px 3px 8px var(--neu-shadow-dark), -3px -3px 8px var(--neu-shadow-light);
    }

    .msg.bot .msg-orb img { width: 22px; height: 22px; object-fit: contain; }

    .msg.user .msg-orb {
      background: var(--text); color: var(--bg);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-weight: 600;
      box-shadow: 3px 3px 8px rgba(18,25,46,0.2);
    }

    .msg-body { display: flex; flex-direction: column; gap: 4px; }

    .msg-sender {
      font-size: 0.65rem; font-weight: 500;
      color: var(--muted); letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 4px;
    }

    .msg.user .msg-sender { text-align: right; }

    .bubble {
      padding: 16px 20px;
      font-size: 0.88rem; line-height: 1.75; font-weight: 300;
      color: var(--text);
    }

    .msg.bot .bubble {
      background: var(--bg);
      border-radius: 4px 20px 20px 20px;
      box-shadow: 6px 6px 16px var(--neu-shadow-dark), -6px -6px 16px var(--neu-shadow-light);
    }

    .msg.user .bubble {
      background: var(--text); color: var(--bg);
      border-radius: 20px 4px 20px 20px;
      box-shadow: 4px 4px 12px rgba(18,25,46,0.2);
    }

    .msg.bot .bubble strong { color: #2e4a8e; font-weight: 500; }
    .msg.bot .bubble ul { padding-left: 18px; margin: 8px 0; }
    .msg.bot .bubble li { margin-bottom: 5px; }

    /* ── Loader ── */
    .loader-row {
      display: none; align-self: flex-start;
      align-items: center; gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    .loader-row.visible { display: flex; }

    .loader-orb {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg);
      box-shadow: 3px 3px 8px var(--neu-shadow-dark), -3px -3px 8px var(--neu-shadow-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .loader-orb img { width: 22px; height: 22px; object-fit: contain; }

    .loader-bubble {
      background: var(--bg);
      border-radius: 4px 20px 20px 20px;
      box-shadow: 6px 6px 16px var(--neu-shadow-dark), -6px -6px 16px var(--neu-shadow-light);
      padding: 18px 24px;
      display: flex; align-items: center; gap: 6px;
    }

    .loader {
      width: 32px; height: 32px;
      color: var(--text);
      position: relative;
      background: radial-gradient(8px, currentColor 94%, #0000);
    }

    .loader::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50%;
      background:
        radial-gradient(7.2px at bottom right, #0000 94%, currentColor) top left,
        radial-gradient(7.2px at bottom left,  #0000 94%, currentColor) top right,
        radial-gradient(7.2px at top right,    #0000 94%, currentColor) bottom left,
        radial-gradient(7.2px at top left,     #0000 94%, currentColor) bottom right;
      background-size: 16px 16px;
      background-repeat: no-repeat;
      animation: loaderAnim 1.5s infinite cubic-bezier(0.3, 1, 0, 1);
    }

    @keyframes loaderAnim {
      33%  { inset: -8px; transform: rotate(0deg); }
      66%  { inset: -8px; transform: rotate(90deg); }
      100% { inset: 0;    transform: rotate(90deg); }
    }

    /* ── Input Area ── */
    .input-area {
      position: relative; z-index: 10;
      padding: 20px 32px 24px;
      background: rgba(207,208,235,0.7);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.6);
    }

    .neu-input-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg);
      border-radius: 24px;
      padding: 6px 6px 6px 24px;
      box-shadow:
        inset 5px 5px 10px var(--neu-shadow-dark),
        inset -5px -5px 10px var(--neu-shadow-light);
    }

    .chat-ta {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem; font-weight: 300;
      resize: none; max-height: 120px;
      line-height: 1.65; min-height: 28px;
    }

    .chat-ta::placeholder { color: rgba(90,99,128,0.4); }

    .send-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--text);
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 4px 4px 10px rgba(18,25,46,0.25), -2px -2px 6px rgba(255,255,255,0.08);
      transition: all 0.2s;
    }

    .send-btn:hover { background: #1e2d52; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 18px; height: 18px; color: var(--bg); transition: transform 0.2s; }
    .send-btn:hover:not(:disabled) svg { transform: translateX(2px) translateY(-2px); }

    .input-note {
      text-align: center; font-size: 0.65rem;
      color: var(--muted); margin-top: 10px;
      letter-spacing: 0.04em; opacity: 0.55;
    }

    .error-banner {
      align-self: center;
      background: rgba(200,50,50,0.08);
      border: 1px solid rgba(200,50,50,0.15);
      border-radius: 12px; padding: 10px 18px;
      font-size: 0.8rem; color: #b03030;
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>
<body>

  <!-- ═══ LOGIN ═══ -->
  <div id="loginScreen">
    <div class="login-card">

      <div class="logo-container">
        <div class="logo-neu">
          <img src="https://raw.githubusercontent.com/Rick94-dot/projetoJARVIS/main/LOGO%20DO%20JARVIS%20v4.png" alt="JARVIS" onerror="this.style.display='none'" />
        </div>
      </div>

      <div class="login-heading">
        <h1>Seja bem-vindo.</h1>
        <p>Sou o JARVIS, assistente da Odonto Empresas.<br>Como posso te chamar?</p>
      </div>

      <div class="login-form">
        <label class="field-label" for="nameInput">Seu nome</label>
        <div class="neu-field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="nameInput" class="neu-input"
            placeholder="Digite seu nome..."
            onkeydown="if(event.key==='Enter') startChat()"
            autocomplete="off" autofocus />
        </div>

        <button class="login-btn" onclick="startChat()">
          Começar
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- ═══ CHAT ═══ -->
  <div id="chatScreen" class="hidden">

    <div class="chat-header">
      <div class="header-logo-btn">
        <img src="https://raw.githubusercontent.com/Rick94-dot/projetoJARVIS/main/LOGO%20DO%20JARVIS%20v4.png" alt="J" onerror="this.style.display='none'" />
      </div>
      <div class="header-title">
        <h1>JARVIS</h1>
        <p>Assistente Odonto Empresas</p>
      </div>
      <div class="header-actions">
        <div class="status-pill">
          <div class="status-dot"></div>
          Online
        </div>
        <div class="user-orb" id="userOrb">
          ?
          <span class="user-orb-name" id="orbName"></span>
        </div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="neu-input-row">
        <textarea class="chat-ta" id="chatInput"
          placeholder="Digite sua mensagem..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)">
        </textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
      <p class="input-note">JARVIS pode cometer erros. Verifique informações importantes.</p>
    </div>

  </div>

  <script>
    const API = 'https://jarvis-backend-ly2b.onrender.com';
    let SESSION = localStorage.getItem('jarvis_sid');
    let NAME    = localStorage.getItem('jarvis_name');
    let busy    = false;

    if (!SESSION) {
      SESSION = 'sid-' + Math.random().toString(36).substr(2, 10);
      localStorage.setItem('jarvis_sid', SESSION);
    }

    window.addEventListener('load', () => {
      if (NAME) openChat(NAME, false);
    });

    async function startChat() {
      const el = document.getElementById('nameInput');
      const name = el.value.trim();
      if (!name) {
        el.classList.add('shake');
        el.focus();
        setTimeout(() => el.classList.remove('shake'), 400);
        return;
      }
      localStorage.setItem('jarvis_name', name);
      fetch(`${API}/set-name`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION, name })
      }).catch(() => {});
      openChat(name, true);
    }

    function openChat(name, isNew) {
      NAME = name;
      const initial = name.charAt(0).toUpperCase();
      document.getElementById('userOrb').firstChild.textContent = initial;
      document.getElementById('orbName').textContent = name;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('chatScreen').classList.remove('hidden');
      if (isNew) sendWelcome();
      else loadHistory();
      setTimeout(() => document.getElementById('chatInput').focus(), 100);
    }

    async function loadHistory() {
      try {
        const r = await fetch(`${API}/history/${SESSION}`);
        const d = await r.json();
        if (d.history?.length) {
          d.history.slice(-14).forEach(m => addMsg(m.role === 'user' ? 'user' : 'bot', m.content, false));
          scroll();
        } else sendWelcome();
      } catch { sendWelcome(); }
    }

    async function sendWelcome() {
      showLoader();
      try {
        const r = await fetch(`${API}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: SESSION, message: `Ola, meu nome e ${NAME}` })
        });
        const d = await r.json();
        hideLoader();
        addMsg('bot', d.response);
      } catch {
        hideLoader();
        addMsg('bot', `Ola, ${NAME}! Como posso ajudar?`);
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function addMsg(role, text, anim = true) {
      const c = document.getElementById('messages');
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      if (!anim) wrap.style.animation = 'none';

      const orb = document.createElement('div');
      orb.className = 'msg-orb';
      if (role === 'bot') {
        const img = document.createElement('img');
        img.src = 'https://raw.githubusercontent.com/Rick94-dot/projetoJARVIS/main/LOGO%20DO%20JARVIS%20v4.png';
        img.alt = 'J';
        img.onerror = () => { img.style.display='none'; orb.textContent='J'; };
        orb.appendChild(img);
      } else {
        orb.textContent = NAME.charAt(0).toUpperCase();
      }

      const body = document.createElement('div');
      body.className = 'msg-body';

      const sender = document.createElement('div');
      sender.className = 'msg-sender';
      sender.textContent = role === 'bot' ? 'JARVIS' : NAME;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = fmt(text);

      body.appendChild(sender);
      body.appendChild(bubble);
      wrap.appendChild(orb);
      wrap.appendChild(body);
      c.appendChild(wrap);
      if (anim) scroll();
    }

    function fmt(t) {
      return t
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
    }

    function showLoader() {
      const c = document.getElementById('messages');
      if (document.getElementById('loaderRow')) return;
      const row = document.createElement('div');
      row.className = 'loader-row visible';
      row.id = 'loaderRow';
      const orbEl = document.createElement('div');
      orbEl.className = 'loader-orb';
      const img = document.createElement('img');
      img.src = 'https://raw.githubusercontent.com/Rick94-dot/projetoJARVIS/main/LOGO%20DO%20JARVIS%20v4.png';
      img.alt = 'J'; img.onerror = () => { img.style.display='none'; };
      orbEl.appendChild(img);
      const bub = document.createElement('div');
      bub.className = 'loader-bubble';
      bub.innerHTML = '<div class="loader"></div>';
      row.appendChild(orbEl);
      row.appendChild(bub);
      c.appendChild(row);
      scroll();
    }

    function hideLoader() {
      document.getElementById('loaderRow')?.remove();
    }

    function scroll() {
      const c = document.getElementById('messages');
      c.scrollTop = c.scrollHeight;
    }

    async function sendMessage() {
      if (busy) return;
      const ta = document.getElementById('chatInput');
      const txt = ta.value.trim();
      if (!txt) return;

      ta.value = ''; ta.style.height = 'auto';
      busy = true;
      document.getElementById('sendBtn').disabled = true;

      addMsg('user', txt);
      showLoader();

      try {
        const r = await fetch(`${API}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: SESSION, message: txt })
        });
        if (!r.ok) throw new Error();
        const d = await r.json();
        hideLoader();
        addMsg('bot', d.response);
      } catch {
        hideLoader();
        const err = document.createElement('div');
        err.className = 'error-banner';
        err.textContent = 'Nao foi possivel conectar ao JARVIS. Tente novamente.';
        document.getElementById('messages').appendChild(err);
        scroll();
      } finally {
        busy = false;
        document.getElementById('sendBtn').disabled = false;
        ta.focus();
      }
    }
  </script>
</body>
</html>
