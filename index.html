<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS — Odonto Empresas</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #cfd0eb;
      --text: #12192e;
      --text-muted: #4a5270;
      --surface: rgba(255,255,255,0.55);
      --border: rgba(18,25,46,0.1);
      --accent: #12192e;
      --accent-light: #1e2d52;
      --input-bg: rgba(255,255,255,0.6);
      --shadow: rgba(18,25,46,0.12);
      --neu-light: #e8e9f8;
      --neu-dark: #b8b9d4;
    }

    html, body { height: 100%; font-family: 'Outfit', sans-serif; overflow: hidden; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ══════════════════════════════
       LOGIN SCREEN
    ══════════════════════════════ */
    #loginScreen {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    #loginScreen.hidden { display: none; }

    #loginScreen::before {
      content: '';
      position: fixed; top: -30%; right: -20%;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.45) 0%, transparent 70%);
      pointer-events: none;
    }

    #loginScreen::after {
      content: '';
      position: fixed; bottom: -20%; left: -15%;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(18,25,46,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      position: relative; z-index: 1;
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 32px;
      padding: 52px 44px 48px;
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 12px 48px var(--shadow), 0 1px 0 rgba(255,255,255,0.9) inset;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .logo-wrap { margin-bottom: 32px; }

    .logo-ring {
      width: 160px; height: 160px; border-radius: 50%;
      background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(207,208,235,0.6));
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow:
        12px 12px 24px var(--neu-dark),
        -12px -12px 24px var(--neu-light),
        0 0 0 6px rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
    }

    .logo-ring img {
      width: 110px; height: 110px; object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(18,25,46,0.18));
    }

    .login-heading { text-align: center; margin-bottom: 36px; }

    .login-heading h1 {
      font-size: 2rem; font-weight: 700;
      color: var(--text); letter-spacing: -0.02em;
    }

    .login-heading p {
      font-size: 0.9rem; color: var(--text-muted);
      margin-top: 10px; line-height: 1.6; font-weight: 400;
    }

    .login-form { width: 100%; display: flex; flex-direction: column; gap: 16px; }

    .field-label {
      font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
      letter-spacing: 0.12em; text-transform: uppercase;
      display: block; margin-bottom: 8px;
    }

    /* Neumorphic input */
    .neu-input-wrap { position: relative; }

    .neu-input-wrap svg {
      position: absolute; left: 18px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px; color: var(--text-muted); pointer-events: none;
    }

    .neu-input {
      width: 100%;
      background: var(--bg);
      border: none; border-radius: 20px;
      padding: 16px 20px 16px 48px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem; font-weight: 400;
      outline: none;
      box-shadow: inset 6px 6px 12px var(--neu-dark), inset -6px -6px 12px var(--neu-light);
      transition: box-shadow 0.25s;
    }

    .neu-input:focus {
      box-shadow: inset 8px 8px 16px var(--neu-dark), inset -8px -8px 16px var(--neu-light),
                  0 0 0 2px rgba(18,25,46,0.15);
    }

    .neu-input::placeholder { color: rgba(74,82,112,0.45); font-weight: 300; }
    .neu-input.error { box-shadow: inset 6px 6px 12px #d4b8b8, inset -6px -6px 12px #f8e8e8; }

    .login-btn {
      width: 100%; padding: 16px;
      border-radius: 20px;
      background: var(--text);
      border: none; color: var(--bg);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 6px 6px 12px rgba(18,25,46,0.3), -2px -2px 8px rgba(255,255,255,0.1);
      margin-top: 4px;
    }

    .login-btn:hover {
      background: var(--accent-light);
      box-shadow: 8px 8px 16px rgba(18,25,46,0.35), -2px -2px 8px rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }

    .login-btn:active { transform: translateY(1px); box-shadow: 3px 3px 8px rgba(18,25,46,0.3); }

    .login-btn svg { width: 18px; height: 18px; transition: transform 0.2s; }
    .login-btn:hover svg { transform: translateX(4px); }

    /* ══════════════════════════════
       CHAT SCREEN
    ══════════════════════════════ */
    #chatScreen {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      background: var(--bg);
      color: var(--text);
    }

    #chatScreen.hidden { display: none; }

    /* Subtle grid */
    #chatScreen::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(18,25,46,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18,25,46,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    /* Header */
    .chat-header {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 16px;
      padding: 18px 32px;
      background: rgba(207,208,235,0.7);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 2px 16px rgba(18,25,46,0.06);
    }

    .header-logo {
      width: 44px; height: 44px; border-radius: 14px;
      background: var(--bg);
      box-shadow: 4px 4px 10px var(--neu-dark), -4px -4px 10px var(--neu-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }

    .header-logo img { width: 32px; height: 32px; object-fit: contain; }

    .header-info h1 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .header-info p { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }

    .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }

    /* User avatar badge */
    .user-avatar-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--bg);
      box-shadow: 4px 4px 10px var(--neu-dark), -4px -4px 10px var(--neu-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; font-weight: 700; color: var(--text);
      cursor: default; flex-shrink: 0;
      position: relative;
    }

    .user-avatar-btn::after {
      content: attr(data-name);
      position: absolute; bottom: -22px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem; font-weight: 500;
      color: var(--text-muted); white-space: nowrap;
    }

    .status-pill {
      display: flex; align-items: center; gap: 7px;
      background: var(--bg);
      box-shadow: 3px 3px 8px var(--neu-dark), -3px -3px 8px var(--neu-light);
      border-radius: 20px; padding: 7px 14px;
      font-size: 0.75rem; color: var(--text-muted); font-weight: 500;
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Messages */
    .messages {
      position: relative; z-index: 1;
      flex: 1; overflow-y: auto;
      padding: 32px 40px;
      display: flex; flex-direction: column; gap: 24px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(18,25,46,0.1); border-radius: 4px;
    }

    .msg {
      display: flex; flex-direction: column;
      max-width: 72%;
      animation: fadeUp 0.3s ease;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot { align-self: flex-start; align-items: flex-start; }

    .msg-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }

    .msg.user .msg-meta { flex-direction: row-reverse; }

    .msg-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
    }

    .msg.user .msg-avatar {
      background: var(--text); color: var(--bg);
      box-shadow: 2px 2px 6px rgba(18,25,46,0.2);
    }

    .msg.bot .msg-avatar {
      background: var(--bg);
      box-shadow: 2px 2px 6px var(--neu-dark), -2px -2px 6px var(--neu-light);
      overflow: hidden;
    }

    .msg.bot .msg-avatar img { width: 18px; height: 18px; object-fit: contain; }

    .msg-name {
      font-size: 0.7rem; font-weight: 600;
      color: var(--text-muted); letter-spacing: 0.05em;
    }

    /* Neumorphic bubbles */
    .bubble {
      padding: 16px 20px; border-radius: 20px;
      font-size: 0.9rem; line-height: 1.7; font-weight: 400;
      color: var(--text);
    }

    .msg.user .bubble {
      background: var(--text); color: var(--bg);
      border-bottom-right-radius: 6px;
      box-shadow: 4px 4px 12px rgba(18,25,46,0.25), -2px -2px 8px rgba(255,255,255,0.08);
    }

    .msg.bot .bubble {
      background: var(--bg);
      border-bottom-left-radius: 6px;
      box-shadow: 6px 6px 14px var(--neu-dark), -6px -6px 14px var(--neu-light);
    }

    .msg.bot .bubble strong { color: var(--accent); font-weight: 600; }
    .msg.bot .bubble ul { padding-left: 20px; margin: 8px 0; }
    .msg.bot .bubble li { margin-bottom: 5px; }

    /* Loader */
    .loader-wrap {
      align-self: flex-start;
      padding: 20px 24px;
      background: var(--bg);
      border-radius: 20px; border-bottom-left-radius: 6px;
      box-shadow: 6px 6px 14px var(--neu-dark), -6px -6px 14px var(--neu-light);
      display: none;
      animation: fadeUp 0.3s ease;
    }

    .loader-wrap.visible { display: flex; align-items: center; justify-content: center; }

    .loader {
      width: 36px; height: 36px;
      color: var(--text);
      position: relative;
      background: radial-gradient(9px, currentColor 94%, #0000);
    }

    .loader::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(8.1px at bottom right, #0000 94%, currentColor) top left,
        radial-gradient(8.1px at bottom left,  #0000 94%, currentColor) top right,
        radial-gradient(8.1px at top right,    #0000 94%, currentColor) bottom left,
        radial-gradient(8.1px at top left,     #0000 94%, currentColor) bottom right;
      background-size: 18px 18px;
      background-repeat: no-repeat;
      animation: loaderSpin 1.5s infinite cubic-bezier(0.3, 1, 0, 1);
    }

    @keyframes loaderSpin {
      33%  { inset: -9px; transform: rotate(0deg); }
      66%  { inset: -9px; transform: rotate(90deg); }
      100% { inset: 0;    transform: rotate(90deg); }
    }

    /* Input area */
    .chat-input-area {
      position: relative; z-index: 10;
      padding: 20px 40px 32px;
      background: rgba(207,208,235,0.5);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.6);
    }

    /* Neumorphic input */
    .neu-chat-wrap {
      display: flex; align-items: center; gap: 14px;
      background: var(--bg);
      border-radius: 28px;
      padding: 8px 8px 8px 24px;
      box-shadow: inset 6px 6px 12px var(--neu-dark), inset -6px -6px 12px var(--neu-light);
    }

    .chat-textarea {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem; font-weight: 400;
      resize: none; max-height: 120px; line-height: 1.6; min-height: 26px;
    }

    .chat-textarea::placeholder { color: rgba(74,82,112,0.45); font-weight: 300; }

    /* Neumorphic send button */
    .neu-send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--bg);
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 4px 4px 10px var(--neu-dark), -4px -4px 10px var(--neu-light);
      transition: all 0.2s;
    }

    .neu-send-btn:hover {
      box-shadow: 6px 6px 14px var(--neu-dark), -6px -6px 14px var(--neu-light);
    }

    .neu-send-btn:active {
      box-shadow: inset 4px 4px 8px var(--neu-dark), inset -4px -4px 8px var(--neu-light);
    }

    .neu-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .neu-send-btn svg { width: 20px; height: 20px; color: var(--text); transition: transform 0.2s; }
    .neu-send-btn:hover:not(:disabled) svg { transform: translateX(2px); }

    .chat-footer-note {
      text-align: center; font-size: 0.68rem;
      color: var(--text-muted); margin-top: 12px; opacity: 0.6;
    }

    .error-msg {
      align-self: center;
      background: rgba(224,85,85,0.1);
      border: 1px solid rgba(224,85,85,0.2);
      border-radius: 12px; padding: 10px 18px;
      font-size: 0.82rem; color: #c0392b;
      animation: fadeUp 0.3s ease;
    }
  </style>
</head>
<body>

  <!-- ══ LOGIN ══ -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="logo-wrap">
        <div class="logo-ring">
          <img
            src="https://raw.githubusercontent.com/Rick94-dot/projetoJARVIS/main/LOGO%20DO%20JARVIS%20v4.png"
            alt="JARVIS"
            onerror="this.style.display='none'"
          />
        </div>
      </div>

      <div class="login-heading">
        <h1>Seja bem-vindo!</h1>
        <p>Sou o JARVIS, assistente da Odonto Empresas.<br>Como posso te chamar?</p>
      </div>

      <div class="login-form">
        <label class="field-label" for="nameInput">Seu nome</label>
        <div class="neu-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input
            type="text" id="nameInput" class="neu-input"
            placeholder="Digite seu nome aqui..."
            onkeydown="if(event.key==='Enter') startChat()"
            autocomplete="off" autofocus
          />
        </div>

        <button class="login-btn" onclick="startChat()">
          Começar conversa
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ══ CHAT ══ -->
  <div id="chatScreen" class="hidden">
    <div class="chat-header">
      <div class="header-logo">
        <img src="https://raw.githubusercontent.com/Rick94-dot/projetoJARVIS/main/LOGO%20DO%20JARVIS%20v4.png" alt="JARVIS" onerror="this.style.display='none'" />
      </div>
      <div class="header-info">
        <h1>JARVIS</h1>
        <p>Assistente Odonto Empresas</p>
      </div>
      <div class="header-right">
        <div class="status-pill">
          <div class="status-dot"></div>
          Online
        </div>
        <div class="user-avatar-btn" id="userAvatarBtn" data-name="">?</div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="chat-input-area">
      <div class="neu-chat-wrap">
        <textarea
          class="chat-textarea" id="chatInput"
          placeholder="Digite sua mensagem..."
          rows="1"
          onkeydown="handleChatKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="neu-send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
      <div class="chat-footer-note">JARVIS pode cometer erros. Verifique informacoes importantes com o SAC: 0800 272 2000</div>
    </div>
  </div>

  <script>
    const API_URL = 'http://127.0.0.1:8000';
    let SESSION_ID = localStorage.getItem('jarvis_session_id');
    let userName = localStorage.getItem('jarvis_user_name');
    let isLoading = false;

    if (!SESSION_ID) {
      SESSION_ID = 'session-' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('jarvis_session_id', SESSION_ID);
    }

    window.addEventListener('load', () => {
      if (userName) {
        openChat(userName, false);
      }
    });

    async function startChat() {
      const input = document.getElementById('nameInput');
      const name = input.value.trim();
      if (!name) {
        input.classList.add('error');
        input.placeholder = 'Por favor, informe seu nome';
        input.focus();
        setTimeout(() => {
          input.classList.remove('error');
          input.placeholder = 'Digite seu nome aqui...';
        }, 2000);
        return;
      }

      localStorage.setItem('jarvis_user_name', name);

      await fetch(`${API_URL}/set-name`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, name })
      }).catch(() => {});

      openChat(name, true);
    }

    function openChat(name, isNew) {
      userName = name;

      const initial = name.charAt(0).toUpperCase();
      const avatarBtn = document.getElementById('userAvatarBtn');
      avatarBtn.textContent = initial;
      avatarBtn.setAttribute('data-name', name);

      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('chatScreen').classList.remove('hidden');

      if (isNew) {
        sendWelcome();
      } else {
        loadHistory();
      }

      setTimeout(() => document.getElementById('chatInput').focus(), 100);
    }

    async function loadHistory() {
      try {
        const res = await fetch(`${API_URL}/history/${SESSION_ID}`);
        const data = await res.json();
        if (data.history && data.history.length > 0) {
          data.history.slice(-12).forEach(msg =>
            addMessage(msg.role === 'user' ? 'user' : 'bot', msg.content, false)
          );
          scrollToBottom();
        } else {
          sendWelcome();
        }
      } catch {
        sendWelcome();
      }
    }

    async function sendWelcome() {
      showLoader();
      try {
        const res = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: SESSION_ID, message: `Ola, meu nome e ${userName}` })
        });
        const data = await res.json();
        hideLoader();
        addMessage('bot', data.response);
      } catch {
        hideLoader();
        addMessage('bot', `Ola, ${userName}! Estou aqui para ajudar com suas duvidas sobre a Odonto Empresas.`);
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleChatKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function addMessage(role, text, animate = true) {
      const container = document.getElementById('messages');

      const msg = document.createElement('div');
      msg.className = `msg ${role}`;
      if (!animate) msg.style.animation = 'none';

      const meta = document.createElement('div');
      meta.className = 'msg-meta';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';

      if (role === 'user') {
        avatar.textContent = userName.charAt(0).toUpperCase();
      } else {
        const img = document.createElement('img');
        img.src = 'https://raw.githubusercontent.com/Rick94-dot/projetoJARVIS/main/LOGO%20DO%20JARVIS%20v4.png';
        img.alt = 'J';
        img.onerror = () => { img.style.display='none'; avatar.textContent = 'J'; };
        avatar.appendChild(img);
      }

      const nameEl = document.createElement('div');
      nameEl.className = 'msg-name';
      nameEl.textContent = role === 'user' ? userName : 'JARVIS';

      meta.appendChild(avatar);
      meta.appendChild(nameEl);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatText(text);

      msg.appendChild(meta);
      msg.appendChild(bubble);
      container.appendChild(msg);

      if (animate) scrollToBottom();
    }

    function formatText(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
    }

    function showLoader() {
      const container = document.getElementById('messages');
      if (document.getElementById('loaderWrap')) return;
      const wrap = document.createElement('div');
      wrap.className = 'loader-wrap visible';
      wrap.id = 'loaderWrap';
      wrap.innerHTML = '<div class="loader"></div>';
      container.appendChild(wrap);
      scrollToBottom();
    }

    function hideLoader() {
      const el = document.getElementById('loaderWrap');
      if (el) el.remove();
    }

    function scrollToBottom() {
      const c = document.getElementById('messages');
      c.scrollTop = c.scrollHeight;
    }

    async function sendMessage() {
      if (isLoading) return;
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      isLoading = true;
      document.getElementById('sendBtn').disabled = true;

      addMessage('user', text);
      showLoader();

      try {
        const res = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: SESSION_ID, message: text })
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        hideLoader();
        addMessage('bot', data.response);
      } catch {
        hideLoader();
        const err = document.createElement('div');
        err.className = 'error-msg';
        err.textContent = 'Nao foi possivel conectar ao JARVIS. Verifique se o servidor esta rodando.';
        document.getElementById('messages').appendChild(err);
        scrollToBottom();
      } finally {
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
